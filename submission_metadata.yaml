ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude for step-by-step guidance on architecture design, code structure,
  and debugging. All scoring logic, weights, and honeypot detection heuristics
  were designed and tuned manually based on reading the JD and candidate data.
  No candidate data was fed to any LLM during ranking.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Rule-based ranker with five scoring components: skill match (35%), experience
  fit (20%), company quality (15%), location fit (15%), and title sanity (15%).
  Title scoring uses three tiers — directly relevant AI/ML roles score highest,
  generic software roles score mid, and clearly unrelated roles (marketing, HR,
  etc.) are penalized heavily. This catches the keyword-stuffer trap where
  candidates list AI buzzwords but hold unrelated titles. Skill matching checks
  core retrieval/ranking categories (embeddings, vector search, ranking eval,
  Python) with trust weighting based on duration and endorsements. A behavioral
  multiplier (recruiter response rate, recency of activity, open-to-work flag)
  adjusts the base score up or down without fully overriding skill fit. Honeypot
  detection checks for internal inconsistencies: mismatched career duration vs
  stated experience, expert proficiency with under 3 months usage, and impossible
  education dates. 68 honeypots were filtered from 100K candidates. Total runtime
  is ~11 seconds on CPU with no network calls.

